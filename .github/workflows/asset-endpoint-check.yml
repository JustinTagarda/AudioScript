name: Asset Endpoint Check

on:
  pull_request:
    paths:
      - "assets/bootstrap/asset-manifest.json"
      - "scripts/Test-AssetManifestEndpoints.ps1"
  workflow_dispatch:
    inputs:
      include_release_required_assets:
        description: "Also verify release-managed optional assets."
        required: false
        default: "false"

jobs:
  verify-asset-endpoints:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify required asset URLs
        shell: pwsh
        run: |
          $arguments = @()
          if ("${{ github.event.inputs.include_release_required_assets }}" -eq "true") {
            $arguments += "-IncludeReleaseRequiredAssets"
          }

          & ./scripts/Test-AssetManifestEndpoints.ps1 @arguments

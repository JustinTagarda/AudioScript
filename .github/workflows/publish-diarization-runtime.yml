name: Publish Diarization Runtime

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag to upload the diarization runtime asset to."
        required: true

permissions:
  contents: write

jobs:
  publish-diarization-runtime:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release_tag
        shell: pwsh
        run: |
          $tagName = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($tagName)) {
            $tagName = "${{ github.event.inputs.tag_name }}"
          }

          if ([string]::IsNullOrWhiteSpace($tagName)) {
            throw "A release tag is required."
          }

          "tag_name=$tagName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build diarization runtime ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path artifacts -Force | Out-Null
          ./scripts/Build-DiarizationRuntimeArchive.ps1 -RepoRoot . -OutputPath artifacts/AudioScript.PyannotePythonRuntime.win-x64.zip

      - name: Upload diarization runtime ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag_name }}
          files: artifacts/AudioScript.PyannotePythonRuntime.win-x64.zip
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Verify release-managed asset URLs
        shell: pwsh
        run: ./scripts/Test-AssetManifestEndpoints.ps1 -IncludeReleaseRequiredAssets -TimeoutSec 60

name: Publish Velopack Release

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-velopack
  cancel-in-progress: false

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore Local Tools
        run: dotnet tool restore

      - name: Publish Velopack Release
        shell: pwsh
        env:
          VELOPACK_RELEASE_REPO_URL: ${{ vars.VELOPACK_RELEASE_REPO_URL }}
          VELOPACK_RELEASES_TOKEN: ${{ secrets.VELOPACK_RELEASES_TOKEN }}
        run: >
          ./scripts/Publish-VelopackRelease.ps1
          -ReleaseRepoUrl "${env:VELOPACK_RELEASE_REPO_URL}"
          -Token "${env:VELOPACK_RELEASES_TOKEN}"
          -PublishToGitHub
          -TargetCommitish "main"

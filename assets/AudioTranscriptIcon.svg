<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">AudioTranscript app icon</title>
  <desc id="desc">A compact icon combining playback audio bars and transcript lines inside a rounded square.</desc>

  <defs>
    <linearGradient id="bg" x1="24" y1="20" x2="228" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E96BD"/>
      <stop offset="1" stop-color="#144D6C"/>
    </linearGradient>
    <linearGradient id="card" x1="60" y1="52" x2="198" y2="206" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FDFEFF"/>
      <stop offset="1" stop-color="#E7F1F6"/>
    </linearGradient>
    <linearGradient id="accent" x1="74" y1="78" x2="124" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2BE5C"/>
      <stop offset="1" stop-color="#D98C2B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#103548" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="52" fill="url(#bg)"/>

  <g opacity="0.12" fill="#FFFFFF">
    <circle cx="196" cy="58" r="18"/>
    <circle cx="214" cy="82" r="8"/>
    <circle cx="54" cy="204" r="10"/>
  </g>

  <g filter="url(#shadow)">
    <path d="M68 52h94l30 30v104c0 10-8 18-18 18H68c-10 0-18-8-18-18V70c0-10 8-18 18-18z"
          fill="url(#card)"/>
    <path d="M162 52v22c0 8 6 14 14 14h16z" fill="#C8DAE3"/>
  </g>

  <g transform="translate(74 76)">
    <rect x="0" y="26" width="14" height="48" rx="7" fill="url(#accent)"/>
    <rect x="22" y="12" width="14" height="76" rx="7" fill="url(#accent)"/>
    <rect x="44" y="0" width="14" height="100" rx="7" fill="url(#accent)"/>
  </g>

  <g fill="#1B5872">
    <rect x="148" y="94" width="32" height="10" rx="5"/>
    <rect x="132" y="118" width="48" height="10" rx="5"/>
    <rect x="124" y="142" width="56" height="10" rx="5"/>
    <rect x="132" y="166" width="40" height="10" rx="5"/>
  </g>

  <g>
    <path d="M156 208c-41 0-74-33-74-74 0-12 3-24 8-34" fill="none" stroke="#F2BE5C" stroke-width="10" stroke-linecap="round" opacity="0.9"/>
    <path d="M90 90l18 4-11 15z" fill="#F2BE5C"/>
  </g>
